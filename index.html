<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> </title>
    <link rel="icon" href="icon.png" type="image/x-icon" />
    <style>
      html {
        overflow-y: scroll;
        scrollbar-width: none;
      }
      html::-webkit-scrollbar {
        display: none;
      }
      .door {
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }
      .doorshake {
        animation: shake 0.5s;
        animation-iteration-count: 1;
      }
      .doorimg:hover {
        cursor: pointer;
      }
      body {
        margin: 0;
        padding: 0;
        background-color: black;
      }
      @keyframes shake {
        0% {
          transform: translate(4px, 0px);
        }
        10% {
          transform: translate(-4px, 0px);
        }
        20% {
          transform: translate(-3px, 0px);
        }
        30% {
          transform: translate(3px, 0px);
        }
        40% {
          transform: translate(-2px, 0px);
        }
        50% {
          transform: translate(2px, 0px);
        }
        60% {
          transform: translate(-1px, 0px);
        }
        70% {
          transform: translate(1px, 0px);
        }
      }
      .bg {
        background-image: url("bro2.png");
        width: 100%;
        height: 450vh;
        background-size: cover;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .eggman img {
        animation: spin 5s linear infinite;
      }
      .eggs {
        font-family: undertale;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      @font-face {
        font-family: undertale;
        src: url(PixelOperator-Bold.ttf) format("truetype");
      }
      .dinput {
        border: 4px solid white;
        margin: 20px;
        height: 30px;
        background-color: black;
        padding: 10px;
        color: white;
        font-family: undertale;
        width: 300px;
        font-size: 40px;
      }
      input:focus {
        outline: none;
      }
      .fagbutton {
        display: flex;
        flex-direction: row;
        margin-top: 50px;
        align-items: center;
      }
      .fagbutton input[type="submit"] {
        background-color: black;
        color: white;
        border: 4px solid white;
        margin: 0;
        height: 60px;
        align-items: center;
        font-family: undertale;
        font-size: 40px;
        cursor: pointer;
      }
      .fagbutton input[type="submit"]:hover {
        background-color: white;
        color: black;
      }
      .show {
        opacity: 1;
      }
      .hide {
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div class="bg">
      <div class="eggman hide">
        <p class="eggs">0</p>
        <img src="egg man.png" alt="gastermaster" />
      </div>
    </div>
    <div class="door">
      <div class="doors">
        <img
          class="doorimg2 hide"
          src="ee1.png"
          alt="enter the other fucking door"
        />
        <img class="doorimg" src="dd1.png" alt="enter the fucking door" />
        <img
          class="doorimg3 hide"
          src="ee1.png"
          alt="enter the other other fucking door"
        />
      </div>
      <div class="fagbutton">
        <input class="dinput" type="text" name="" id="" />
        <input class="button" type="submit" value="Enter" />
      </div>
    </div>
  </body>
  <script>
    var dooropened = false;

    if (!localStorage.getItem("doorsOpened")) {
      localStorage.setItem(
        "doorsOpened",
        JSON.stringify({ door2: false, door3: false })
      );
    }

    const door = document.querySelector(".doorimg");
    const door2 = document.querySelector(".doorimg2");
    const door3 = document.querySelector(".doorimg3");
    const button = document.querySelector(".button");
    const eggman = document.querySelector(".eggman");
    const eggs = document.querySelector(".eggs");
    const input = document.querySelector(".dinput");

    let spinDuration = 5;
    let eggmanSize = 100;

    door.addEventListener("mouseover", () => {
      if (!dooropened) door.src = "dd2.png";
    });
    door.addEventListener("mouseout", () => {
      if (!dooropened) door.src = "dd1.png";
    });
    door.addEventListener("click", () => {
      if (!dooropened) {
        door.classList.add("doorshake");
        door.src = "dd3.png";
        const audio = new Audio("door.wav");
        audio.volume = 0.5;
        audio.play();
        dooropened = true;
        setTimeout(() => {
          window.location.href = "30.html";
        }, 2000);
      }
    });

    function updateUnlockedDoors() {
      const state = JSON.parse(localStorage.getItem("doorsOpened"));

      if (state.door2) {
        door2.classList.remove("hide");
        door2.src = "ee1.png";
        door2.addEventListener("mouseover", () => {
          if (!dooropened) door2.src = "ee2.png";
        });
        door2.addEventListener("mouseout", () => {
          if (!dooropened) door2.src = "ee1.png";
        });
        door2.addEventListener("click", () => {
          if (!dooropened) {
            door2.classList.add("doorshake");
            door2.src = "ee3.png";
            const audio = new Audio("door.wav");
            audio.volume = 0.5;
            audio.play();
            dooropened = true;
            setTimeout(() => {
              window.location.href = "67.html";
            }, 2000);
          }
        });
      }

      if (state.door3) {
        door3.classList.remove("hide");
        door3.src = "ee1.png";
        door3.addEventListener("mouseover", () => {
          if (!dooropened) door3.src = "ee2.png";
        });
        door3.addEventListener("mouseout", () => {
          if (!dooropened) door3.src = "ee1.png";
        });
        door3.addEventListener("click", () => {
          if (!dooropened) {
            door3.classList.add("doorshake");
            door3.src = "ee3.png";
            const audio = new Audio("door.wav");
            audio.volume = 0.5;
            audio.play();
            dooropened = true;
            setTimeout(() => {
              window.location.href = "48.html";
            }, 2000);
          }
        });
      }
    }
    const glass = new Audio("snd_glass_crunch.wav");
    glass.volume = 0.2;

    const levelup = new Audio("snd_levelup.wav");
    levelup.volume = 0.5;

    eggman.addEventListener("click", () => {
      glass.currentTime = 0;
      glass.play();
      const currentCount = parseInt(eggs.textContent, 10);
      eggs.textContent = currentCount + 1;
      spinDuration /= 1.1;
      document.styleSheets[0].insertRule(
        `@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }`,
        document.styleSheets[0].cssRules.length
      );
      eggman.querySelector(
        "img"
      ).style.animation = `spin ${spinDuration}s linear infinite`;
      eggmanSize += 0.5;
      if (currentCount % 50 === 0) {
        levelup.currentTime = 0;
        levelup.play();
        eggman.querySelector("img").style.width = `${eggmanSize}%`;
        eggman.querySelector("img").style.height = `${eggmanSize}%`;
      }
    });

    button.addEventListener("click", () => {
      const state = JSON.parse(localStorage.getItem("doorsOpened"));
      input.value = input.value.trim();
      const val = input.value.toLowerCase();

      if (val === "hunter" && !state.door2) {
        state.door2 = true;
        localStorage.setItem("doorsOpened", JSON.stringify(state));
        const unlockAudio = new Audio("snd_ominous.wav");
        unlockAudio.volume = 0.2;
        unlockAudio.play();
        updateUnlockedDoors();
      } else if (val === "danger" && !state.door3) {
        state.door3 = true;
        localStorage.setItem("doorsOpened", JSON.stringify(state));
        const unlockAudio = new Audio("snd_ominous.wav");
        unlockAudio.volume = 0.2;
        unlockAudio.play();
        updateUnlockedDoors();
      } else if (val === "egg") {
        eggman.classList.remove("hide");
        const eggAudio = new Audio("snd_creepyjingle.wav");
        eggAudio.volume = 0.5;
        eggAudio.play();
      } else if (val === "gurt") {
        localStorage.clear();
        setTimeout(() => {
          window.location.reload();
        }, 1000);
      } else if (val === "") {
        localStorage.clear();
        setTimeout(() => {
          window.location.reload();
        }, 1000);
      } else {
        input.value = "";
      }

      input.value = "";
    });

    updateUnlockedDoors();
  </script>
</html>
