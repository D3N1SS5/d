<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> </title>
    <style>
      html {
        overflow-y: scroll;
        scrollbar-width: none;
      }
      html::-webkit-scrollbar {
        display: none;
      }
      .door {
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .doorshake {
        animation: shake 0.5s;
        animation-iteration-count: 1;
      }
      .doorimg:hover {
        cursor: pointer;
      }
      body {
        margin: 0;
        padding: 0;
        background-color: black;
      }
      @keyframes shake {
        0% {
          transform: translate(4px, 0px);
        }
        10% {
          transform: translate(-4px, 0px);
        }
        20% {
          transform: translate(-3px, 0px);
        }
        30% {
          transform: translate(3px, 0px);
        }
        40% {
          transform: translate(-2px, 0px);
        }
        50% {
          transform: translate(2px, 0px);
        }
        60% {
          transform: translate(-1px, 0px);
        }
        70% {
          transform: translate(1px, 0px);
        }
      }
      .bg {
        background-image: url("bro2.png");
        width: 100%;
        height: 450vh;
        background-size: cover;
      }
    </style>
  </head>
  <body>
    <div class="bg"></div>
    <div class="door">
      <img class="doorimg" src="dd1.png" alt="enter the fucking door" />
    </div>
  </body>
  <script>
    var dooropened = false;
    const door = document.querySelector(".doorimg");
    door.addEventListener("mouseover", () => {
      if (!dooropened) door.src = "dd2.png";
    });
    door.addEventListener("mouseout", () => {
      if (!dooropened) door.src = "dd1.png";
    });
    door.addEventListener("click", () => {
      if (!dooropened) {
        door.classList.add("doorshake");
        door.src = "dd3.png";
        const audio = new Audio("door.wav");
        audio.volume = 0.5;
        audio.play();
        dooropened = true;
        setTimeout(() => {
          window.location.href = "30.html";
        }, 2000);
      }
    });
  </script>
</html>
